<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>musicbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #111;
            color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: #888;
        }
        button {
            font-size: 1.2rem;
            padding: 0.8rem 2.5rem;
            border: 1px solid #444;
            border-radius: 4px;
            background: #222;
            color: #ddd;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        button:hover:not(:disabled) {
            background: #333;
            border-color: #666;
        }
        button:disabled {
            opacity: 0.4;
            cursor: default;
        }
        #status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>musicbox</h1>
        <button id="toggle">Play</button>
        <p id="status"></p>
    </div>
    <script src="main.js"></script>
</body>
</html>
